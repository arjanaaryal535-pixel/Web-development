<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">My Website</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="photos.html">Photos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-content-offset">
    <div class="page-wrapper">

      <h2 id="main-heading">Feedback Form</h2>

      <form class="feedback-form" action="#" method="post">

        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName"
               placeholder="Enter your full name" required minlength="2" maxlength="50">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>

        <p><strong>Rating</strong></p>
        <p>
          <input type="radio" name="rating" id="veryStatisfied" value="Very Satisfied" required>
          <label for="veryStatisfied" style="display:inline;">Very Satisfied</label><br>

          <input type="radio" name="rating" id="satisfied" value="Satisfied">
          <label for="satisfied" style="display:inline;">Satisfied</label><br>

          <input type="radio" name="rating" id="neutral" value="Neutral">
          <label for="neutral" style="display:inline;">Neutral</label><br>

          <input type="radio" name="rating" id="unsatisfied" value="Unsatisfied">
          <label for="unsatisfied" style="display:inline;">Unsatisfied</label>
        </p>

        <p><strong>Interests</strong></p>
        <p>
          <input type="checkbox" name="interests" id="webDev" value="Web Development">
          <label for="webDev" style="display:inline;">Web Development</label><br>

          <input type="checkbox" name="interests" id="mobileDev" value="Mobile Development">
          <label for="mobileDev" style="display:inline;">Mobile Development</label><br>

          <input type="checkbox" name="interests" id="aiMl" value="AI & Machine Learning">
          <label for="aiMl" style="display:inline;">AI &amp; Machine Learning</label>
        </p>

        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="" disabled selected>Select your country</option>
          <option value="Nepal">Nepal</option>
          <option value="India">India</option>
          <option value="United States">United States</option>
          <option value="United Kingdom">United Kingdom</option>
          <option value="Australia">Australia</option>
        </select>

        <label for="feedbackMessage">Write your feedback here</label>
        <textarea id="feedbackMessage" name="feedbackMessage" rows="5"
                  placeholder="Type your feedback here..." minlength="10" maxlength="500" required></textarea>

        <button type="submit">Submit</button>

      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
